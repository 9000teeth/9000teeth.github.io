<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>channel RED</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Xanh+Mono&display=swap" rel="stylesheet">
<link href="/radio.css" rel="stylesheet" type="text/css" media="all">
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/amplitudejs@5.3.2/dist/amplitude.js"></script>
<script src="https://code.jquery.com/jquery-3.5.1.js"></script>
<script type="text/javascript" src="radio.js"></script>
<link rel="icon" type="image/jpg" href="icon.jpg">
</head>
<body>
	<div class="select"><ol>
        <li><a>Japan</a>
            <div class="display">
                <div class="tracklist-container" id="sp24-1-tracklist">
                    <ul class="tracklist">
                    </ul>
                </div>

                <div class="player-container">
                    <div class="progress-container">
                        <progress class="played amplitude-song-played-progress" data-amplitude-playlist="sp24-1"></progress>
                        <progress class="buffered amplitude-buffered-progress" data-amplitude-playlist="sp24-1" value="0"></progress>
                    </div>
                    <div class="time-container">
                        <span class="amplitude-current-time" data-amplitude-playlist="sp24-1"></span>
                        <span class="amplitude-duration-time" data-amplitude-playlist="sp24-1"></span>
                    </div>

                    <div class="control-container">
                        <div class="icon prev-button amplitude-prev" data-amplitude-playlist="sp24-1"></div>
                        <div class="icon play-button amplitude-play-pause" data-amplitude-playlist="sp24-1"></div>
                        <div class="icon next-button amplitude-next" data-amplitude-playlist="sp24-1"></div>
                    </div>

                    <div class="volume-container">
                        <div class="icon mute-button amplitude-mute" data-amplitude-playlist="sp24-1"></div>
                        <input type="range" class="amplitude-volume-slider" step=".1"/>
                    </div>
                </div>
            </div>
        </li>
        <li><a>Koreas</a>
            <div class="display">
                <div class="tracklist-container" id="sp24-2-tracklist">
                    <ul class="tracklist">
                    </ul>
                </div>

                <div class="player-container">
                    <div class="progress-container">
                        <progress class="played amplitude-song-played-progress" data-amplitude-playlist="sp24-2"></progress>
                        <progress class="buffered amplitude-buffered-progress" data-amplitude-playlist="sp24-2" value="0"></progress>
                    </div>
                    <div class="time-container">
                        <span class="amplitude-current-time" data-amplitude-playlist="sp24-2"></span>
                        <span class="amplitude-duration-time" data-amplitude-playlist="sp24-2"></span>
                    </div>

                    <div class="control-container">
                        <div class="icon prev-button amplitude-prev" data-amplitude-playlist="sp24-2"></div>
                        <div class="icon play-button amplitude-play-pause" data-amplitude-playlist="sp24-2"></div>
                        <div class="icon next-button amplitude-next" data-amplitude-playlist="sp24-2"></div>
                    </div>

                    <div class="volume-container">
                        <div class="icon mute-button amplitude-mute" data-amplitude-playlist="sp24-2"></div>
                        <input type="range" class="amplitude-volume-slider" step=".1"/>
                    </div>
                </div>
            </div>
        </li>
        <li class="tba">Mainland China, Taiwan, Hong Kong</li>
        <li class="tba">Mongolia & Kazakhstan</li>
        <li class="tba">Vietnam, Thailand, Cambodia</li>
        <li class="tba">Philippines & Indonesia</li>
        <li class="tba">Indian subcontinent</li>
        <li class="tba">Iran</li>
        <li class="tba">Arab world</li>
        <li class="tba">Türkiye</li>
        <li class="tba">Armenia & Georgia</li>
        <li class="tba">Slavics</li>
    </ol></div>
</body>
</html>
